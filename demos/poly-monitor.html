<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyMonitor — 預測市場投資儀表板</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #e8590c;
    --accent: #58a6ff;
    --tag-green: #1a7f37;
    --tag-bg: #dcf0e4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #58a6ff, #e8590c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .dot.stale { background: var(--yellow); animation: none; }
  .dot.error { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .wallet-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wallet-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .refresh-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .refresh-btn:hover { background: var(--border); }
  .last-updated {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Layout ── */
  .main-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
  }

  @media (max-width: 900px) {
    .main-container { grid-template-columns: 1fr; }
  }

  /* ── Portfolio Summary ── */
  .portfolio-section { margin-bottom: 28px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .portfolio-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .portfolio-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Position Cards ── */
  .position-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .position-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .position-question {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    flex: 1;
    padding-right: 12px;
  }
  .position-outcome {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .position-outcome.yes { background: var(--tag-bg); color: var(--tag-green); }
  .position-outcome.no { background: #fde8e8; color: var(--red); }

  .position-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 12px 0;
    padding: 10px;
    background: var(--bg);
    border-radius: 8px;
  }
  .pos-stat { text-align: center; }
  .pos-stat-val { font-size: 14px; font-weight: 600; }
  .pos-stat-lbl { font-size: 10px; color: var(--muted); }

  /* Redeem slider */
  .redeem-section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .redeem-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .redeem-amount { font-weight: 600; color: var(--green); }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    height: 4px;
    cursor: pointer;
  }
  .redeem-btn {
    width: 100%;
    margin-top: 8px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .redeem-btn.ready { opacity: 1; }
  .redeem-btn:hover { opacity: 0.85; }

  /* ── Opportunities ── */
  .opportunities-section {}

  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .filter-btn:hover { color: var(--text); }

  /* ── Opportunity Cards ── */
  .opportunities-grid {
    display: grid;
    gap: 14px;
  }

  .opp-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .opp-card:hover { border-color: var(--accent); }
  .opp-card.super::before {
    content: '🔥 超級推薦';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--orange);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .opp-card.super { border-color: var(--orange); }

  .opp-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .opp-question {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.5;
    flex: 1;
    padding-right: 80px;
  }
  .opp-stars {
    font-size: 13px;
    color: var(--yellow);
    letter-spacing: 1px;
    white-space: nowrap;
    margin-right: 8px;
  }
  .opp-meta {
    display: flex;
    gap: 12px;
    margin: 8px 0;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .opp-meta span { display: flex; align-items: center; gap: 3px; }

  .opp-outcomes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 12px 0;
  }
  .outcome-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .outcome-btn:hover {
    border-color: var(--accent);
    background: rgba(88,166,255,0.08);
  }
  .outcome-btn.selected {
    border-color: var(--accent);
    background: rgba(88,166,255,0.12);
  }
  .outcome-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .outcome-price { font-size: 18px; font-weight: 700; }
  .outcome-prob { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .opp-footer {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 12px;
  }
  .amount-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    width: 100%;
  }
  .amount-input:focus { outline: none; border-color: var(--accent); }
  .invest-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .invest-btn:hover { background: #3998ff; }
  .invest-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Notification Badge ── */
  .notif-badge {
    position: fixed;
    top: 80px;
    right: 24px;
    background: var(--orange);
    color: white;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    max-width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    animation: slideIn 0.3s ease;
  }
  .notif-badge.show { display: block; }
  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    z-index: 300;
    display: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .toast.show { display: flex; gap: 10px; align-items: center; }
  .toast.ok { border-color: var(--green); }
  .toast.err { border-color: var(--red); }

  /* ── Loading ── */
  .loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; padding: 20px 0; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }

  /* ── Sidebar ── */
  .sidebar {}
  .alert-card {
    background: linear-gradient(135deg, rgba(232,89,12,0.15), rgba(88,166,255,0.1));
    border: 1px solid var(--orange);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .alert-card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .alert-card-question {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .alert-card-action {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .alert-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    text-align: center;
  }
  .alert-btn-yes { background: var(--green); color: white; }
  .alert-btn-no { background: var(--red); color: white; }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .info-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row span:last-child { color: var(--text); font-weight: 500; }

  .refresh-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    padding: 8px 0;
  }
</style>
</head>
<body>

<!-- Notification -->
<div class="notif-badge" id="notifBadge"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">PolyMonitor</div>
  <div class="header-status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">已連接</span>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="refreshAll()">⟳ 重新整理</button>
  </div>
</header>

<!-- Main -->
<div class="main-container">

  <!-- Left: Opportunities + Portfolio -->
  <div class="content">

    <!-- Portfolio -->
    <div class="portfolio-section">
      <div class="section-title">💼 我的投資組合</div>
      <div class="portfolio-cards" id="portfolioCards">
        <div class="portfolio-stat">
          <div class="stat-label">總價值</div>
          <div class="stat-value" id="totalValue">載入中...</div>
          <div class="stat-sub" id="totalChange"></div>
        </div>
        <div class="portfolio-stat">
          <div class="stat-label">已實現盈虧</div>
          <div class="stat-value positive" id="realizedPnl">載入中...</div>
          <div class="stat-sub">帳戶總額</div>
        </div>
        <div class="portfolio-stat">
          <div class="stat-label">可用現金</div>
          <div class="stat-value" id="cashBalance">$0</div>
          <div class="stat-sub">可投入新市場</div>
        </div>
        <div class="portfolio-stat">
          <div class="stat-label">勝率</div>
          <div class="stat-value" id="winRate">—</div>
          <div class="stat-sub">已結算市場</div>
        </div>
      </div>

      <!-- Current Positions -->
      <div id="positionsList"></div>
    </div>

    <!-- Opportunities -->
    <div class="opportunities-section">
      <div class="section-title">🎯 投資機會</div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('crypto', this)">加密</button>
        <button class="filter-btn" onclick="setFilter('geo', this)">地緣</button>
        <button class="filter-btn" onclick="setFilter('macro', this)">宏觀</button>
        <button class="filter-btn" onclick="setFilter('short', this)">短期 (&lt;7天)</button>
      </div>
      <div class="opportunities-grid" id="opportunitiesGrid">
        <div class="loading"><div class="spinner"></div>正在抓取市場數據...</div>
      </div>
    </div>
  </div>

  <!-- Right: Sidebar -->
  <div class="sidebar">
    <div class="alert-card" id="superAlert" style="display:none">
      <div class="alert-card-title">🔥 超级推荐</div>
      <div class="alert-card-question" id="superAlertQuestion"></div>
      <div id="superAlertOutcomes"></div>
      <div class="alert-card-action">
        <button class="alert-btn alert-btn-yes" id="superAlertYes" onclick="quickInvest('yes')">投 YES</button>
        <button class="alert-btn alert-btn-no" id="superAlertNo" onclick="quickInvest('no')">投 NO</button>
      </div>
    </div>

    <div class="info-card">
      <div class="info-title">📊 策略說明</div>
      <div class="info-row"><span>篩選標準</span><span>20%~80% 價格區間</span></div>
      <div class="info-row"><span>流動性</span><span>Volume > $100K</span></div>
      <div class="info-row"><span>最短期限</span><span>1 天以上</span></div>
      <div class="info-row"><span>評級標準</span><span>⭐⭐ = 一般 ⭐⭐⭐ = 良好</span></div>
      <div class="info-row"><span>刷新頻率</span><span>每 3 小時自動更新</span></div>
      <div class="info-row"><span>超級推薦</span><span>即時推送到此頁面</span></div>
    </div>

    <div class="info-card">
      <div class="info-title">💡 注意事項</div>
      <div class="info-row"><span>風險提示</span><span>預測市場有風險</span></div>
      <div class="info-row"><span>投資金額</span><span>請量力而為</span></div>
      <div class="info-row"><span>查看倉位</span><span>需要錢包已連接</span></div>
    </div>

    <div class="info-card">
      <div class="info-title">🔗 快速連結</div>
      <div class="info-row"><span>Polymarket</span><span><a href="https://polymarket.com" target="_blank" style="color:var(--accent)">打開</a></span></div>
      <div class="info-row"><span>投資紀錄</span><span>本機快取</span></div>
    </div>

    <div class="refresh-indicator">
      <div class="dot" id="refreshDot"></div>
      <span>下次自動更新：<span id="nextRefresh">—</span></span>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
const CATEGORIES = {
  crypto: ['Crypto', 'Bitcoin', 'Ethereum', 'Solana', 'Airdrops', 'Fdv', 'Token Launch', 'Crypto Prices'],
  geo: ['Geopolitics', 'Iran', 'Politics', 'Elections'],
  macro: ['Finance', 'Economics', 'Weather', 'Culture'],
  short: [] // filtered by end date < 7 days
};

let currentFilter = 'all';
let markets = [];
let positions = [];
let selectedOutcomes = {}; // { marketSlug: 'yes' | 'no' }
let investAmounts = {};    // { marketSlug: string }
let redeemAmounts = {};   // { positionId: number }

// ── Utility ────────────────────────────────────────────
function fmt(n, dec=0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + (typeof n === 'number' ? n.toFixed(dec) : n);
}

function prob(price) { return (parseFloat(price) * 100).toFixed(0) + '%'; }

function timeLeft(ends) {
  if (!ends) return '—';
  const diff = new Date(ends) - Date.now();
  if (diff <= 0) return '已結束';
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (d > 0) return `${d}天 ${h}小時`;
  if (h > 0) return `${h}小時 ${m}分`;
  return `${m}分鐘`;
}

function stars(market) {
  const prob_yes = parseFloat(market.yesPrice || 0.5);
  const vol = parseFloat(market.volume24h || 0);
  const daysLeft = (new Date(market.endDate) - Date.now()) / 86400000;
  // Star rating based on: edge (20-70% is ideal), volume, days left
  let score = 0;
  if (prob_yes >= 0.2 && prob_yes <= 0.8) score += 2;
  if (prob_yes >= 0.3 && prob_yes <= 0.7) score += 1;
  if (vol > 500000) score += 1;
  if (vol > 2000000) score += 1;
  if (daysLeft <= 7) score += 1; // short term
  if (score >= 4) return '⭐⭐⭐';
  if (score >= 3) return '⭐⭐';
  return '⭐';
}

function isSuper(market) {
  const prob_yes = parseFloat(market.yesPrice || 0);
  const vol = parseFloat(market.volume24h || 0);
  const daysLeft = (new Date(market.endDate) - Date.now()) / 86400000;
  // Super if: prob is in sweet spot AND very high volume AND short term
  return prob_yes >= 0.25 && prob_yes <= 0.65 && vol > 1000000 && daysLeft <= 14;
}

function getCat(market) {
  const c = market.categories || [];
  for (const [key, vals] of Object.entries(CATEGORIES)) {
    if (vals.some(v => c.includes(v))) return key;
  }
  return 'other';
}

function matchesFilter(market) {
  if (currentFilter === 'all') return true;
  if (currentFilter === 'short') {
    const days = (new Date(market.endDate) - Date.now()) / 86400000;
    return days <= 7;
  }
  return getCat(market) === currentFilter;
}

// ── Toast / Notification ────────────────────────────────
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.className = `toast show ${type}`;
  t.innerHTML = msg;
  setTimeout(() => t.className = 'toast', 3000);
}

function showNotif(msg) {
  const n = document.getElementById('notifBadge');
  n.textContent = msg;
  n.className = 'notif-badge show';
  setTimeout(() => n.className = 'notif-badge', 5000);
}

// ── Filter ──────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOpportunities();
}

// ── Render Opportunities ────────────────────────────────
function renderOpportunities() {
  const grid = document.getElementById('opportunitiesGrid');
  const filtered = markets.filter(m => matchesFilter(m) && !isExpired(m));

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">目前沒有符合條件的市場</div>';
    return;
  }

  grid.innerHTML = filtered.map(m => {
    const slug = m.slug || m.id || Math.random().toString(36);
    const sel = selectedOutcomes[slug] || 'yes';
    const amt = investAmounts[slug] || '10';
    const prob_yes = parseFloat(m.yesPrice || 0);
    const prob_no = 1 - prob_yes;
    const sup = isSuper(m);
    const vol = parseFloat(m.volume24h || 0);

    return `
    <div class="opp-card ${sup ? 'super' : ''}" id="card-${slug}">
      <div class="opp-header">
        <div class="opp-question">${m.question || m.title || '—'}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="opp-stars">${stars(m)}</div>
          <div style="font-size:10px;color:var(--muted)">${m.markets ? m.markets.length + ' 結果' : ''}</div>
        </div>
      </div>
      <div class="opp-meta">
        <span>📊 ${vol > 1000000 ? (vol/1000000).toFixed(1)+'M' : (vol/1000).toFixed(0)+'K'} Vol</span>
        <span>⏱ ${timeLeft(m.endDate)}</span>
        ${m markets ? `<span>📋 ${m.markets.map(mm=>mm.outcome).join(' / ')}</span>` : ''}
      </div>
      <div class="opp-outcomes">
        <div class="outcome-btn ${sel==='yes'?'selected':''}" onclick="selectOutcome('${slug}','yes',${prob_yes})">
          <div class="outcome-label">YES</div>
          <div class="outcome-price">${(prob_yes*100).toFixed(1)}¢</div>
          <div class="outcome-prob">機率 ${(prob_yes*100).toFixed(0)}%</div>
        </div>
        <div class="outcome-btn ${sel==='no'?'selected':''}" onclick="selectOutcome('${slug}','no',${prob_no})">
          <div class="outcome-label">NO</div>
          <div class="outcome-price">${(prob_no*100).toFixed(1)}¢</div>
          <div class="outcome-prob">機率 ${(prob_no*100).toFixed(0)}%</div>
        </div>
      </div>
      <div class="opp-footer">
        <input class="amount-input" type="number" min="1" max="500" value="${amt}"
          onchange="investAmounts['${slug}']=this.value"
          placeholder="投入金額 (USDC)">
        <button class="invest-btn"
          onclick="investInMarket('${slug}', '${sel}', ${sel==='yes'?prob_yes:prob_no})">
          確定投資 $${amt}
        </button>
      </div>
    </div>`;
  }).join('');
}

function isExpired(m) {
  if (!m.endDate) return false;
  return new Date(m.endDate) < new Date();
}

function selectOutcome(slug, side, prob) {
  selectedOutcomes[slug] = side;
  renderOpportunities();
}

function investAmount(slug) {
  return parseFloat(investAmounts[slug] || '10');
}

function investInMarket(slug, side, prob) {
  const amt = investAmount(slug);
  if (!amt || amt < 1) { showToast('請輸入有效金額', 'err'); return; }

  const market = markets.find(m => (m.slug || m.id) === slug);
  const question = market?.question || slug;
  const price = (prob * 100).toFixed(1);

  // Notify via toast + log for agent to pick up
  const msg = `📩 投資請求\n\n市場：${question}\n方向：${side.toUpperCase()} @ ${price}¢\n金額：$${amt} USDC`;
  showToast(`✅ 投資請求已發送：${side.toUpperCase()} $${amt}`, 'ok');
  console.log('[PolyMonitor INVEST]', {
    question, side, price, amount: amt,
    marketUrl: `https://polymarket.com/event/${slug}`
  });

  // Store in localStorage for persistence
  const pending = JSON.parse(localStorage.getItem('pendingInvests') || '[]');
  pending.push({ question, side, price, amount: amt, slug, ts: Date.now() });
  localStorage.setItem('pendingInvests', JSON.stringify(pending));
}

// ── Render Positions ────────────────────────────────────
function renderPositions() {
  const container = document.getElementById('positionsList');
  if (positions.length === 0) {
    container.innerHTML = '<div class="empty" style="padding:16px">尚無倉位，或需要錢包連接</div>';
    return;
  }

  container.innerHTML = positions.map(p => {
    const shares = parseFloat(p.shares || 0);
    const avgPx = parseFloat(p.avgPrice || 0);
    const nowPx = parseFloat(p.price || p.yesPrice || avgPx);
    const cost = shares * avgPx;
    const value = shares * nowPx;
    const pnl = value - cost;
    const redeemable = Math.floor(shares * 0.5); // max 50% redeemable
    const redeemAmt = redeemAmounts[p.id] || redeemable;

    return `
    <div class="position-card">
      <div class="position-header">
        <div class="position-question">${p.question || '—'}</div>
        <div class="position-outcome ${p.outcome==='Yes'||p.outcome==='yes'?'yes':'no'}">${p.outcome}</div>
      </div>
      <div class="position-stats">
        <div class="pos-stat">
          <div class="pos-stat-val">${(avgPx*100).toFixed(1)}¢</div>
          <div class="pos-stat-lbl">均價</div>
        </div>
        <div class="pos-stat">
          <div class="pos-stat-val">${(nowPx*100).toFixed(1)}¢</div>
          <div class="pos-stat-lbl">現價</div>
        </div>
        <div class="pos-stat">
          <div class="pos-stat-val">${shares.toFixed(1)}</div>
          <div class="pos-stat-lbl">股數</div>
        </div>
        <div class="pos-stat" style="color:${pnl>=0?'var(--green)':'var(--red)'}">
          <div class="pos-stat-val">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div>
          <div class="pos-stat-lbl">未實現</div>
        </div>
      </div>
      <div class="redeem-section">
        <div class="redeem-label">
          <span>贖回股數</span>
          <span class="redeem-amount">${redeemAmt} 股 ≈ $${(redeemAmt * nowPx).toFixed(2)}</span>
        </div>
        <input type="range" min="0" max="${redeemable}" value="${redeemAmt}"
          oninput="redeemAmounts['${p.id}']=parseInt(this.value);this.parentElement.querySelector('.redeem-amount').textContent=this.value+' 股 ≈ $'+(this.value*${nowPx}).toFixed(2)">
        <button class="redeem-btn ${redeemAmt>0?'ready':''}"
          onclick="redeemPosition('${p.id}', ${redeemAmt})">
          ${redeemAmt > 0 ? `贖回 ${redeemAmt} 股` : '選擇贖回數量'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function redeemPosition(posId, shares) {
  if (!shares || shares < 1) return;
  const pos = positions.find(p => p.id === posId);
  if (!pos) return;
  showToast(`✅ 贖回請求已發送：${shares} 股`, 'ok');
  console.log('[PolyMonitor REDEEM]', { posId, shares, question: pos.question });
  const pending = JSON.parse(localStorage.getItem('pendingRedeems') || '[]');
  pending.push({ posId, shares, question: pos.question, ts: Date.now() });
  localStorage.setItem('pendingRedeems', JSON.stringify(pending));
}

// ── Fetch Data ─────────────────────────────────────────
async function fetchMarkets() {
  try {
    const res = await fetch('https://clob.polymarket.com/markets?limit=100&closed=false');
    const data = await res.json();
    markets = data.markets || data || [];
    // Filter to liquid, non-expired markets
    markets = markets.filter(m => {
      const vol = parseFloat(m.volume24h || 0);
      const price = parseFloat(m.yesPrice || 0.5);
      return vol > 50000 && price > 0.05 && price < 0.95 && !isExpired(m);
    });
    markets.sort((a, b) => parseFloat(b.volume24h || 0) - parseFloat(a.volume24h || 0));

    // Check for super opportunities
    const superMkt = markets.find(m => isSuper(m));
    if (superMkt) {
      showSuperAlert(superMkt);
      showNotif(`🔥 超級推薦：${superMkt.question}`);
    }

    renderOpportunities();
    updateStatus('ok');
  } catch (e) {
    console.error(e);
    updateStatus('error');
    document.getElementById('opportunitiesGrid').innerHTML =
      '<div class="empty" style="color:var(--red)">載入失敗，請檢查網路或錢包連接</div>';
  }
}

async function fetchPositions() {
  // Positions require wallet connection - set demo data for now
  // In production, this would connect to user's wallet
  const demoPositions = [
    {
      id: 'hormuz-1',
      question: 'Strait of Hormuz traffic returns to normal by end of May?',
      outcome: 'Yes',
      shares: '115.4',
      avgPrice: '0.345',
      price: '0.595',
      yesPrice: '0.595'
    }
  ];

  positions = demoPositions;

  // Portfolio totals
  const totalValue = positions.reduce((sum, p) => {
    return sum + parseFloat(p.shares) * parseFloat(p.price || p.yesPrice), 0);
  }, 0);
  const totalCost = positions.reduce((sum, p) => {
    return sum + parseFloat(p.shares) * parseFloat(p.avgPrice), 0;
  }, 0);
  const totalPnl = totalValue - totalCost;

  document.getElementById('totalValue').textContent = fmt(totalValue);
  document.getElementById('totalValue').className = 'stat-value ' + (totalPnl >= 0 ? 'positive' : 'negative');
  document.getElementById('totalChange').textContent = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)} (全部倉位)`;
  document.getElementById('realizedPnl').textContent = `+$${(totalPnl).toFixed(2)}`;
  document.getElementById('cashBalance').textContent = '$0';
  document.getElementById('winRate').textContent = positions.length > 0 ? '1/1' : '—';

  renderPositions();
}

function showSuperAlert(mkt) {
  const card = document.getElementById('superAlert');
  const q = document.getElementById('superAlertQuestion');
  const outs = document.getElementById('superAlertOutcomes');
  const slug = mkt.slug || mkt.id;
  const prob_yes = parseFloat(mkt.yesPrice || 0);

  q.textContent = mkt.question;
  outs.innerHTML = `
    <div class="opp-outcomes" style="margin:8px 0">
      <div class="outcome-btn selected" onclick="quickInvestSelect='yes';showToast('已選擇 YES','ok')">
        <div class="outcome-label">YES</div>
        <div class="outcome-price">${(prob_yes*100).toFixed(1)}¢</div>
      </div>
      <div class="outcome-btn" onclick="quickInvestSelect='no';showToast('已選擇 NO','ok')">
        <div class="outcome-label">NO</div>
        <div class="outcome-price">${((1-prob_yes)*100).toFixed(1)}¢</div>
      </div>
    </div>`;
  card.style.display = 'block';

  window.superAlertSlug = slug;
  window.quickInvestSelect = 'yes';
}

// ── Quick Invest from Super Alert ──────────────────────
function quickInvest(side) {
  const slug = window.superAlertSlug;
  if (!slug) return;
  const mkt = markets.find(m => (m.slug || m.id) === slug);
  if (!mkt) return;
  const prob = side === 'yes' ? parseFloat(mkt.yesPrice) : (1 - parseFloat(mkt.yesPrice));
  selectedOutcomes[slug] = side;
  investAmounts[slug] = '20';
  investInMarket(slug, side, prob);
}

// ── Refresh All ─────────────────────────────────────────
async function refreshAll() {
  updateStatus('loading');
  await Promise.all([fetchMarkets(), fetchPositions()]);
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  scheduleNextRefresh();
}

function updateStatus(s) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (s === 'ok') { dot.className='dot'; txt.textContent='已連接'; }
  else if (s === 'loading') { dot.className='dot stale'; txt.textContent='更新中...'; }
  else { dot.className='dot error'; txt.textContent='連接失敗'; }
}

// ── Auto Refresh ────────────────────────────────────────
let refreshInterval = 3 * 60 * 60 * 1000; // 3 hours
let refreshTimer;

function scheduleNextRefresh() {
  clearTimeout(refreshTimer);
  const now = Date.now();
  const next = new Date(now + refreshInterval);
  document.getElementById('nextRefresh').textContent =
    `${String(next.getHours()).padStart(2,'0')}:${String(next.getMinutes()).padStart(2,'0')}`;
  document.getElementById('refreshDot').className = 'dot stale';

  refreshTimer = setTimeout(() => {
    refreshAll();
  }, refreshInterval);

  // Countdown
  const countdown = setInterval(() => {
    const remaining = refreshInterval - (Date.now() - now);
    if (remaining <= 0) { clearInterval(countdown); return; }
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    document.getElementById('nextRefresh').textContent =
      `${h}小時 ${m}分`;
  }, 60000);
}

// ── Boot ────────────────────────────────────────────────
(async function init() {
  await refreshAll();
  scheduleNextRefresh();

  // Listen for messages from agent (for super alerts)
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'polyAlert') {
      showNotif(e.data.message);
      showToast(e.data.message, 'ok');
    }
  });
})();
</script>
