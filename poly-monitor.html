<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyMonitor</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--green:#3fb950;--red:#f85149;--yellow:#d29922;--orange:#e8590c;--accent:#58a6ff;--purple:#a371f7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#58a6ff,#e8590c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
.dot.ok{background:var(--green)}.dot.loading{background:var(--yellow);animation:none}.dot.error{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.refresh-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 14px;font-size:13px;cursor:pointer}
.refresh-btn:hover{background:var(--border)}
.last-updated{font-size:11px;color:var(--muted)}
.main{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 280px;gap:24px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.stat-val.g{color:var(--green)}.stat-val.r{color:var(--red)}.stat-val.p{color:var(--purple)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.pos-chip{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:8px}
.pos-chip.yes{background:#dcf0e4;color:#1a7f37}.pos-chip.no{background:#fde8e8;color:#f85149}
.pos-q{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:8px}
.pos-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--bg);border-radius:8px;padding:10px}
.pos-s-lbl{font-size:10px;color:var(--muted);text-align:center}
.pos-s-val{font-size:14px;font-weight:600;text-align:center}
.redeem-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.redeem-info{font-size:12px;color:var(--muted);white-space:nowrap}
.redeem-amount{font-size:12px;font-weight:600;color:var(--green)}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.redeem-btn{background:#f85149;color:white;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.redeem-btn:disabled{opacity:0.4;cursor:not-allowed}
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);padding:4px 12px;font-size:11px;cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.filter-btn:hover{color:var(--text)}
.opp-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:border-color 0.2s}
.opp-card:hover{border-color:#30363d}
.opp-card.pick{border-color:var(--orange);border-width:2px;background:linear-gradient(135deg,rgba(232,89,12,0.06),transparent)}
.opp-q{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:8px;padding-right:8px}
.meta{display:flex;gap:8px;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.tag.geo{background:rgba(232,89,12,0.15);color:var(--orange)}
.tag.crypto{background:rgba(163,113,247,0.15);color:var(--purple)}
.tag.macro{background:rgba(88,166,255,0.15);color:var(--accent)}
.tag.short{background:rgba(63,185,80,0.15);color:var(--green)}
.tag.resolved{background:rgba(248,81,73,0.15);color:var(--red)}
.price-screenshot{width:100%;border-radius:8px;border:1px solid var(--border);margin-bottom:10px;display:block}
.price-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.price-row.highlight{background:rgba(63,185,80,0.1);border-radius:6px;padding:6px 8px;margin:4px -4px}
.price-label{font-weight:600}
.price-value.yes{color:var(--green);font-weight:700;font-size:16px}
.price-value.no{color:#f85149;font-weight:700;font-size:16px}
.price-value.neutral{color:var(--muted)}
.prob{font-size:11px;color:var(--muted);margin-left:6px}
.reason-box{background:rgba(232,89,12,0.08);border:1px solid rgba(232,89,12,0.25);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--text);line-height:1.6}
.reason-box strong{color:var(--orange)}
.rec-badge{background:var(--orange);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.outcomes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.out-btn{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;transition:all 0.15s;position:relative}
.out-btn:hover{border-color:#4a5568}
.out-btn.sel-yes{border-color:var(--green);background:rgba(63,185,80,0.1)}
.out-btn.sel-no{border-color:#f85149;background:rgba(248,81,73,0.1)}
.out-lbl{font-size:12px;font-weight:700;margin-bottom:4px}
.out-lbl.yes{color:var(--green)}.out-lbl.no{color:#f85149}
.out-price{font-size:20px;font-weight:800}
.out-price.yes{color:var(--green)}.out-price.no{color:#f85149}
.out-hint{font-size:10px;color:var(--muted);margin-top:2px}
.foot{display:flex;gap:8px;align-items:center}
.amt-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:13px}
.amt-input:focus{outline:none;border-color:var(--accent)}
.inv-btn{background:var(--green);color:white;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.inv-btn:hover{background:#36a048}
.inv-btn:disabled{opacity:0.4;cursor:not-allowed}
.sidebar{}
.super-alert{display:none;margin-bottom:14px}
.super-alert.show{display:block;background:linear-gradient(135deg,rgba(232,89,12,0.2),rgba(163,113,247,0.1));border:2px solid var(--orange);border-radius:14px;padding:16px}
.super-alert-title{font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.super-alert-title::before{content:'🔥 '}
.super-alert-q{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:8px}
.super-reason{background:rgba(232,89,12,0.1);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);margin-bottom:12px;line-height:1.6}
.super-reason strong{color:var(--orange)}
.super-img{width:100%;border-radius:8px;border:1px solid rgba(232,89,12,0.3);margin-bottom:10px;display:block}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.info-title{font-size:12px;font-weight:600;margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--muted)}
.info-row:last-child{border-bottom:none}
.info-row span:last-child{color:var(--text)}
.info-row a{color:var(--accent);text-decoration:none}
.loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:30px 0;justify-content:center}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:300;display:none;box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.toast.show{display:flex;gap:8px;align-items:center}.toast.ok{border-color:var(--green)}.toast.err{border-color:#f85149}
.notif{position:fixed;top:70px;right:16px;background:var(--orange);color:white;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;max-width:300px;z-index:200;display:none;animation:slide 0.3s ease}
.notif.show{display:block}@keyframes slide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.alert-box{background:rgba(248,81,73,0.15);border:1px solid rgba(248,81,73,0.4);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#f85149;line-height:1.5}
.alert-box strong{display:block;margin-bottom:4px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="notif" id="notif"></div>
<header>
  <div class="logo">PolyMonitor</div>
  <div class="dot ok" id="dot"></div>
  <span id="status" style="font-size:12px;color:var(--muted)">已連接</span>
  <div class="header-right">
    <span class="last-updated" id="lastUpd">—</span>
    <button class="refresh-btn" onclick="refresh()">⟳ 刷新</button>
  </div>
</header>
<div class="main">
  <div class="left">
    <div style="margin-bottom:28px">
      <div class="section-title">💼 我的倉位</div>
      <div class="stats">
        <div class="stat"><div class="stat-lbl">總價值</div><div class="stat-val" id="s-val">$68.68</div><div class="stat-sub" id="s-chg">+72.56%</div></div>
        <div class="stat"><div class="stat-lbl">未實現盈虧</div><div class="stat-val g" id="s-pnl">+$28.88</div><div class="stat-sub">帳戶總額</div></div>
        <div class="stat"><div class="stat-lbl">可用現金</div><div class="stat-val" id="s-cash">$0</div><div class="stat-sub">需充值</div></div>
        <div class="stat"><div class="stat-lbl">勝率</div><div class="stat-val p" id="s-wr">—</div><div class="stat-sub">待結算</div></div>
      </div>
      <div id="pos-list"></div>
    </div>
    <div>
      <div class="section-title">🎯 市場快照 <span id="mkts-count" style="font-size:11px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0"></span></div>
      <div id="opp-list"><div class="loading"><div class="spinner"></div>載入中...</div></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="super-alert" id="superAlert">
      <div class="super-alert-title">🔥 今日精選</div>
      <div class="super-alert-q" id="superQ"></div>
      <div class="super-reason" id="superReason"></div>
      <img class="super-img" id="superImg" src="iran-action.png" alt="market">
      <div style="display:flex;gap:8px">
        <button class="inv-btn" style="flex:1;background:var(--green)" id="btnY" onclick="qInvest('yes')">✅ 投 YES</button>
        <button class="inv-btn" style="flex:1;background:#f85149" id="btnN" onclick="qInvest('no')">❌ 投 NO</button>
      </div>
    </div>
    <div class="info-card">
      <div class="info-title">📊 市場價格（截圖）</div>
      <div class="info-row"><span>Iran 軍事行動</span><span style="color:var(--orange)">⚠️ 已結算</span></div>
      <div class="info-row"><span>Fed 4月決策</span><span>No change 99.1¢</span></div>
      <div class="info-row"><span>說明</span><span>圖片為即時截圖</span></div>
    </div>
    <div class="info-card">
      <div class="info-title">⚠️ 重要提醒</div>
      <div class="info-row"><span>Iran market</span><span style="color:#f85149">已結算！</span></div>
      <div class="info-row"><span>你的倉位</span><span>是不同市場</span></div>
    </div>
    <div class="info-card">
      <div class="info-title">⚠️ 風險提示</div>
      <div class="info-row"><span>本金</span><span>可能歸零</span></div>
      <div class="info-row"><span>建議</span><span>每筆≤20%總額</span></div>
    </div>
    <div class="info-card">
      <div class="info-title">🔗 連結</div>
      <div class="info-row"><span>Polymarket</span><span><a href="https://polymarket.com" target="_blank" rel="noopener">polymarket.com</a></span></div>
      <div class="info-row"><span>我的倉位</span><span><a href="https://polymarket.com/portfolio" target="_blank" style="color:var(--accent)">查看倉位</a></span></div>
    </div>
  </div>
</div>
<script>
// Market data with real prices from screenshots
const MARKET_DATA = [
  {
    slug: 'military-action-against-iran-ends-by-522',
    title: '美伊軍事行動四月底前結束？',
    question: 'Military action against Iran ends by April 30?',
    category: 'geo',
    yesPrice: null, noPrice: null,
    resolved: true,
    resolutionOutcome: 'YES (已結算→爭議中)',
    volume24h: 30744957,
    endDate: '2026-04-30T00:00:00Z',
    tags: ['geo','resolved'],
    screenshot: 'iran-action.png',
    recYes: false, recNo: false,
    recReason: null,
    statusNote: '⚠️ 此市場已結算提議YES，但有爭議。你的倉位在「霍爾木茲海峽」是不同市場。'
  },
  {
    slug: 'fed-decision-in-april',
    title: 'Fed 四月利率決策？',
    question: 'Fed decision in April? (No change 99.1%)',
    category: 'macro',
    yesPrice: 0.991, noPrice: 0.010,
    resolved: false,
    volume24h: 97272979,
    endDate: '2026-04-29T00:00:00Z',
    tags: ['macro','short'],
    screenshot: 'fed-april.png',
    recYes: false, recNo: false,
    recReason: 'Fed No change 99.1%——市場幾乎確定不變。方向太明確，沒有投機價值。觀望。'
  }
];

let sel = {}, amt = {}, redeemAmt = {};
const $ = id => document.getElementById(id);
const fmt = (n, d = 0) => isNaN(n) ? '—' : '$' + parseFloat(n).toFixed(d);
const pct = p => p ? (parseFloat(p) * 100).toFixed(1) + '¢' : '—';
const left = ts => {
  if (!ts) return '—';
  const d = new Date(ts) - Date.now();
  if (d <= 0) return '已結束';
  const D = Math.floor(d / 864e5), h = Math.floor(d % 864e5 / 36e5);
  return D ? `${D}天${h}小時` : `${h}小時`;
};
const volFmt = v => { v = parseFloat(v || 0); return v > 1e6 ? (v / 1e6).toFixed(1) + 'M' : v > 1e3 ? (v / 1e3).toFixed(0) + 'K' : v.toFixed(0); };

function getCat(m) { return m.category || 'other'; }

function renderOpps() {
  const container = $('opp-list');
  $('mkts-count').textContent = `（${MARKET_DATA.length}個）`;

  container.innerHTML = MARKET_DATA.map(m => {
    const slug = m.slug;
    const s = sel[slug] || 'yes';
    const a = amt[slug] || '10';
    const tags = m.tags.map(t => {
      if (t === 'geo') return '<span class="tag geo">🌍 地緣</span>';
      if (t === 'crypto') return '<span class="tag crypto">🌙 加密</span>';
      if (t === 'macro') return '<span class="tag macro">📊 宏觀</span>';
      if (t === 'short') return '<span class="tag short">⏱ 短期</span>';
      if (t === 'resolved') return '<span class="tag resolved">⚠️ 已結算</span>';
      return '';
    }).join('');

    const yesSelected = m.recYes ? 'sel-yes' : (m.recNo ? '' : (s === 'yes' ? 'sel-yes' : ''));
    const noSelected = m.recNo ? 'sel-no' : (m.recYes ? '' : (s === 'no' ? 'sel-no' : ''));
    const yesLabel = m.recYes ? '✅ YES（Ada推薦）' : 'YES';
    const noLabel = m.recNo ? '✅ NO（Ada推薦）' : 'NO';

    return `<div class="opp-card ${m.recYes||m.recNo?'pick':''}">
      ${(m.recYes||m.recNo)?'<div class="rec-badge">'+(m.recYes?'🔥 Ada推薦':'⚠️ 注意')+'</div>':''}
      <div class="opp-q">${m.title}</div>
      <div class="meta">
        ${tags}
        <span style="color:var(--muted);font-size:10px">💰 ${volFmt(m.volume24h)} · ⏱ ${left(m.endDate)}</span>
      </div>
      ${m.statusNote ? `<div class="alert-box"><strong>⚠️ 重要：</strong>${m.statusNote}</div>` : ''}
      ${m.screenshot ? `<img class="price-screenshot" src="${m.screenshot}" alt="${m.title}" loading="lazy">` : ''}
      ${m.recReason ? `<div class="reason-box">💡 <strong>Ada 分析：</strong>${m.recReason}</div>` : ''}
      <div class="price-box">
        <div class="price-row ${m.recYes?'highlight':''}">
          <span class="price-label yes">YES</span>
          <span class="price-value ${m.yesPrice?'yes':'neutral'}">${pct(m.yesPrice)}${m.yesPrice?' → ':''}${m.yesPrice&&m.recYes?' ✅':' → 需至Polymarket查看'}</span>
        </div>
        <div class="price-row ${m.recNo?'highlight':''}">
          <span class="price-label no">NO</span>
          <span class="price-value ${m.noPrice?'no':'neutral'}">${pct(m.noPrice)}${m.noPrice&&m.recNo?' ✅':' → 需至Polymarket查看'}</span>
        </div>
      </div>
      <div class="outcomes">
        <div class="out-btn ${yesSelected}" onclick="sel['${slug}']='yes';renderOpps()">
          <div class="out-lbl yes">${yesLabel}</div>
          <div class="out-price yes">${pct(m.yesPrice)||'—'}</div>
          <div class="out-hint"><a href="https://polymarket.com/event/${slug}" target="_blank" style="color:var(--accent);font-size:10px;text-decoration:none">→ 前往Polymarket</a></div>
        </div>
        <div class="out-btn ${noSelected}" onclick="sel['${slug}']='no';renderOpps()">
          <div class="out-lbl no">${noLabel}</div>
          <div class="out-price no">${pct(m.noPrice)||'—'}</div>
          <div class="out-hint"><a href="https://polymarket.com/event/${slug}" target="_blank" style="color:var(--accent);font-size:10px;text-decoration:none">→ 前往Polymarket</a></div>
        </div>
      </div>
      ${!m.resolved?`<div class="foot">
        <input class="amt-input" type="number" min="1" max="500" value="${a}" placeholder="投入 USDC" onchange="amt['${slug}']=this.value">
        <button class="inv-btn" onclick="doInvest('${slug}')">📩 通知 Ada</button>
      </div>`:`<div style="font-size:12px;color:var(--muted);text-align:center;padding:6px 0">市場已結算，無需投資</div>`}
    </div>`;
  }).join('');

  // Set super alert
  const recMkt = MARKET_DATA.find(m => m.recYes || m.recNo);
  if (recMkt) {
    $('superQ').textContent = recMkt.title;
    $('superReason').innerHTML = `💡 <strong>分析：</strong>${recMkt.recReason || '—'}`;
    if (recMkt.screenshot) $('superImg').src = recMkt.screenshot;
    $('superAlert').className = 'super-alert show';
    const btnY = $('btnY');
    const btnN = $('btnN');
    btnY.onclick = () => qInvest('yes');
    btnN.onclick = () => qInvest('no');
    notif('🔥 ' + recMkt.title);
  }
}

function renderPos() {
  // User's real position
  const pos = [{
    id: 'hormuz-1',
    question: 'Strait of Hormuz traffic returns to normal by end of May?',
    outcome: 'Yes',
    shares: '115.4',
    avgPrice: '0.345',
    price: '0.595',
    yesPrice: '0.595'
  }];
  const container = $('pos-list');
  if (!pos.length) { container.innerHTML = '<div class="empty" style="padding:16px">尚無倉位</div>'; return; }
  container.innerHTML = pos.map(p => {
    const shares = parseFloat(p.shares), avgPx = parseFloat(p.avgPrice);
    const nowPx = parseFloat(p.price);
    const cost = shares * avgPx, value = shares * nowPx, pnl = value - cost;
    const maxRedeem = Math.floor(shares * 0.5);
    const ra = redeemAmt[p.id] !== undefined ? redeemAmt[p.id] : Math.floor(shares * 0.3);
    return `<div class="pos-card">
      <div class="pos-chip yes">${p.outcome}</div>
      <div class="pos-q">${p.question}</div>
      <div class="pos-stats">
        <div><div class="pos-s-val">${(avgPx*100).toFixed(1)}¢</div><div class="pos-s-lbl">均價</div></div>
        <div><div class="pos-s-val">${(nowPx*100).toFixed(1)}¢</div><div class="pos-s-lbl">現價</div></div>
        <div><div class="pos-s-val">${shares.toFixed(1)}</div><div class="pos-s-lbl">股數</div></div>
        <div style="color:${pnl>=0?'var(--green)':'#f85149'}">
          <div class="pos-s-val">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div>
          <div class="pos-s-lbl">未實現</div>
        </div>
      </div>
      <div class="redeem-row">
        <div class="redeem-info">贖回 <span class="redeem-amount" id="ra-${p.id}">${ra}股≈$${(ra*nowPx).toFixed(2)}</span></div>
        <input type="range" min="0" max="${maxRedeem}" value="${ra}" oninput="redeemAmt['${p.id}']=parseInt(this.value);document.getElementById('ra-${p.id}').textContent=this.value+'股≈$'+Math.round(this.value*${nowPx}*100)/100">
        <button class="redeem-btn" onclick="doRedeem('${p.id}',${ra})" ${ra<1?'disabled':''}>贖回</button>
      </div>
    </div>`;
  }).join('');
}

function qInvest(side) {
  const m = MARKET_DATA.find(x => x.recYes || x.recNo);
  if (!m) return;
  sel[m.slug] = side;
  amt[m.slug] = '20';
  doInvest(m.slug);
}

function doInvest(slug) {
  const m = MARKET_DATA.find(x => x.slug === slug);
  if (!m) { toast('找不到市場', 'err'); return; }
  const side = sel[slug] || 'yes';
  const a = parseFloat(amt[slug] || '10');
  if (!a || a < 1) { toast('請輸入有效金額', 'err'); return; }
  const isRec = (m.recYes && side === 'yes') || (m.recNo && side === 'no');
  toast(`📩 已通知 Ada：${side.toUpperCase()} $${a} USDC${isRec?'（推薦）':''}`);
  const req = JSON.parse(localStorage.getItem('polyReqs') || '[]');
  req.push({ type: 'invest', question: m.question, side, amount: a, slug: 'https://polymarket.com/event/' + slug, ts: Date.now() });
  localStorage.setItem('polyReqs', JSON.stringify(req));
}

function doRedeem(id, shares) {
  if (!shares || shares < 1) return;
  const p = [{ id: 'hormuz-1', question: 'Strait of Hormuz traffic returns to normal by end of May?' }].find(x => x.id === id);
  if (!p) return;
  toast(`✅ 贖回請求：${shares} 股`);
  const req = JSON.parse(localStorage.getItem('polyReqs') || '[]');
  req.push({ type: 'redeem', id, shares, question: p.question, ts: Date.now() });
  localStorage.setItem('polyReqs', JSON.stringify(req));
}

function toast(msg, type = 'ok') { $('toast').className = `toast show ${type}`; $('toast').textContent = msg; setTimeout(() => $('toast').className = 'toast', 4000); }
function notif(msg) { $('notif').textContent = msg; $('notif').className = 'notif show'; setTimeout(() => $('notif').className = 'notif', 6000); }

function refresh() {
  const n = new Date();
  $('lastUpd').textContent = `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  renderOpps();
  renderPos();
}

refresh();
</script>
</body>
</html>
