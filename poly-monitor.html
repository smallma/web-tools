<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyMonitor</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--green:#3fb950;--red:#f85149;--orange:#e8590c;--accent:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#58a6ff,#e8590c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
.dot.ok{background:var(--green)}.dot.loading{background:var(--orange);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.refresh-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 14px;font-size:13px;cursor:pointer}
.last-updated{font-size:11px;color:var(--muted)}
.main{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 280px;gap:24px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.stat-val.g{color:var(--green)}.stat-val.r{color:var(--red)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.pos-chip{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:8px}
.pos-chip.yes{background:#dcf0e4;color:#1a7f37}.pos-chip.no{background:#fde8e8;color:#f85149}
.pos-q{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:8px}
.pos-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--bg);border-radius:8px;padding:10px}
.pos-s-lbl{font-size:10px;color:var(--muted);text-align:center}
.pos-s-val{font-size:14px;font-weight:600;text-align:center}
.redeem-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.redeem-info{font-size:12px;color:var(--muted)}
.redeem-amount{font-size:12px;font-weight:600;color:var(--green)}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.redeem-btn{background:#f85149;color:white;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.redeem-btn:disabled{opacity:0.4}
/* Market cards */
.market-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.market-card:hover{border-color:#30363d}
.market-card.pick{border-color:var(--orange);border-width:2px;background:linear-gradient(135deg,rgba(232,89,12,0.06),transparent)}
.market-title{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:8px;padding-right:8px}
.market-meta{display:flex;gap:8px;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.tag.geo{background:rgba(232,89,12,0.15);color:var(--orange)}
.tag.macro{background:rgba(88,166,255,0.15);color:var(--accent)}
.tag.short{background:rgba(63,185,80,0.15);color:var(--green)}
.tag.resolved{background:rgba(248,81,73,0.15);color:#f85149}
/* Outcome buttons - THE CORE */
.outcome-btn{display:block;width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;text-align:left;transition:all 0.15s;text-decoration:none;color:var(--text)}
.outcome-btn:hover{border-color:#4a5568;text-decoration:none}
.outcome-btn.rec-yes{border-color:var(--green);background:rgba(63,185,80,0.1)}
.outcome-btn.rec-no{border-color:#f85149;background:rgba(248,81,73,0.1)}
.outcome-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.outcome-name{font-size:13px;font-weight:600}
.outcome-prob{font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:10px}
.outcome-prices{display:flex;gap:12px;align-items:center}
.outcome-price{font-size:20px;font-weight:800;font-family:ui-monospace,monospace}
.outcome-price.yes{color:var(--green)}.outcome-price.no{color:#f85149}
.outcome-hint{font-size:10px;color:var(--muted)}
.rec-arrow{font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;display:inline-block;margin-left:6px}
.rec-arrow.yes{background:var(--green);color:white}.rec-arrow.no{background:#f85149;color:white}
/* Recommendation box */
.rec-box{background:linear-gradient(135deg,rgba(232,89,12,0.15),rgba(63,185,80,0.05));border:1px solid rgba(232,89,12,0.3);border-radius:10px;padding:12px;margin:12px 0}
.rec-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:6px}
.rec-title::before{content:'🔥 '}
.rec-text{font-size:12px;color:var(--text);line-height:1.6;margin-bottom:6px}
.rec-action{display:flex;gap:8px;flex-wrap:wrap}
.rec-action-item{background:rgba(63,185,80,0.15);border:1px solid rgba(63,185,80,0.3);border-radius:8px;padding:8px 12px;font-size:12px}
.rec-action-item strong{color:var(--green)}
/* Alert */
.alert-box{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#f85149;line-height:1.5}
/* Image */
.market-screenshot{width:100%;border-radius:8px;border:1px solid var(--border);margin:10px 0;display:block;cursor:pointer}
/* Invest row */
.invest-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.amt-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:14px}
.amt-input:focus{outline:none;border-color:var(--accent)}
.inv-btn{background:var(--green);color:white;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.inv-btn:hover{background:#36a048}
/* Sidebar */
.sidebar{}
.super-alert{display:none;margin-bottom:14px}
.super-alert.show{display:block;background:linear-gradient(135deg,rgba(232,89,12,0.2),rgba(63,185,80,0.05));border:2px solid var(--orange);border-radius:14px;padding:16px}
.super-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:8px}
.super-title::before{content:'🔥 '}
.super-q{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:8px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.info-title{font-size:12px;font-weight:600;margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--muted)}
.info-row:last-child{border-bottom:none}
.info-row span:last-child{color:var(--text)}
.info-row a{color:var(--accent);text-decoration:none}
.loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:30px 0;justify-content:center}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:300;display:none}
.toast.show{display:flex;gap:8px;align-items:center}.toast.ok{border-color:var(--green)}.toast.err{border-color:#f85149}
.notif{position:fixed;top:70px;right:16px;background:var(--orange);color:white;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;max-width:300px;z-index:200;display:none;animation:slide 0.3s ease}
.notif.show{display:block}@keyframes slide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="notif" id="notif"></div>
<header>
  <div class="logo">PolyMonitor</div>
  <div class="dot ok"></div>
  <span style="font-size:12px;color:var(--muted)">Ada 即時抓取</span>
  <div class="header-right">
    <span class="last-updated" id="lastUpd">—</span>
    <button class="refresh-btn" onclick="location.reload()">⟳ 刷新</button>
  </div>
</header>
<div class="main">
  <div class="left">
    <div style="margin-bottom:28px">
      <div class="section-title">💼 我的倉位</div>
      <div class="stats">
        <div class="stat"><div class="stat-lbl">總價值</div><div class="stat-val">$68.68</div><div class="stat-sub">+72.56%</div></div>
        <div class="stat"><div class="stat-lbl">未實現</div><div class="stat-val g">+$28.88</div><div class="stat-sub">帳戶總額</div></div>
        <div class="stat"><div class="stat-lbl">可用現金</div><div class="stat-val">$0</div><div class="stat-sub">需充值</div></div>
        <div class="stat"><div class="stat-lbl">勝率</div><div class="stat-val">—</div><div class="stat-sub">待結算</div></div>
      </div>
      <div id="pos-list"></div>
    </div>
    <div>
      <div class="section-title">🎯 市場快照（Ada 即時 CDP 抓取）</div>
      <div id="markets"></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="super-alert" id="superAlert">
      <div class="super-title">🔥 今日精選</div>
      <div class="super-q" id="superQ"></div>
      <div id="superRec"></div>
    </div>
    <div class="info-card">
      <div class="info-title">📊 即時按鈕價格</div>
      <div class="info-row"><span>🟠 Hezbollah Apr18</span><span style="color:var(--green)">YES 92¢ / NO 9¢</span></div>
      <div class="info-row"><span>🏦 Fed No change</span><span style="color:var(--green)">YES 99.1¢</span></div>
      <div class="info-row"><span>⚽ 世界盃 Brazil</span><span>YES 17.2¢</span></div>
    </div>
    <div class="info-card">
      <div class="info-title">⚠️ 風險提示</div>
      <div class="info-row"><span>本金</span><span>可能歸零</span></div>
      <div class="info-row"><span>每筆</span><span>≤20%總額</span></div>
      <div class="info-row"><span>按鈕價格</span><span>USDC 計價</span></div>
    </div>
    <div class="info-card">
      <div class="info-title">🔗 連結</div>
      <div class="info-row"><span>Polymarket</span><span><a href="https://polymarket.com" target="_blank">polymarket.com</a></span></div>
      <div class="info-row"><span>我的倉位</span><span><a href="https://polymarket.com/portfolio" target="_blank">portfolio</a></span></div>
    </div>
  </div>
</div>
<script>
// 市場數據（Ada CDP 即時抓取，所有價格都是按鈕上的 USDC 價格）
const MARKETS = [
  {
    slug: 'israel-x-hezbollah-ceasefire-by',
    title: '🟠 Israel x Hezbollah 停火協議？',
    endDate: '2026-06-30',
    volume24h: '$12.08M',
    category: 'geo',
    resolved: false,
    screenshot: 'hezbollah.png',
    rec: {
      yes: true,

    },
    outcomes: [
      {
        date: 'April 18（主要）',

        yesPrice: 0.92,

        polyUrl: 'https://polymarket.com/event/israel-x-hezbollah-ceasefire-by'
      },
      {
        date: 'April 21',
        outcome: 'April 21 停火 → YES',
        yesPrice: 0.96,
        noPrice: 0.09,
        prob: '94%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/israel-x-hezbollah-ceasefire-by'
      },
      {
        date: 'April 30',
        outcome: 'April 30 停火 → YES',
        yesPrice: 0.982,
        noPrice: 0.021,
        prob: '98%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/israel-x-hezbollah-ceasefire-by'
      },
      {
        date: 'June 30',
        outcome: 'June 30 停火 → YES',
        yesPrice: 0.991,
        noPrice: 0.010,
        prob: '99%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/israel-x-hezbollah-ceasefire-by'
      }
    ]
  },
  {
    slug: 'fed-decision-in-april',
    title: '🏦 Fed 四月利率決策？（2026/04/29）',
    endDate: '2026-04-29',
    volume24h: '$97.27M',
    category: 'macro',
    resolved: false,
    screenshot: 'fed-april.png',
    rec: {
      yes: null,
      reason: 'Fed No change 99.1¢——市場幾乎確定不變，方向太明確沒有投機價值。觀望。'
    },
    outcomes: [
      {
        date: '主要結果',
        outcome: 'No change（利率不變）→ YES',
        yesPrice: 0.991,
        noPrice: 0.010,
        prob: '99.1%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/fed-decision-in-april'
      },
      {
        date: '其他結果',
        outcome: '25 bps decrease → YES',
        yesPrice: 0.005,
        noPrice: 0.996,
        prob: '<1%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/fed-decision-in-april'
      },
      {
        date: '其他結果',
        outcome: '25+ bps increase → YES',
        yesPrice: 0.004,
        noPrice: 0.997,
        prob: '<1%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/fed-decision-in-april'
      },
      {
        date: '其他結果',
        outcome: '50+ bps decrease → YES',
        yesPrice: 0.003,
        noPrice: 0.998,
        prob: '<1%',
        yesRec: false,
        polyUrl: 'https://polymarket.com/event/fed-decision-in-april'
      }
    ]
  },
  {
    slug: '2026-fifa-world-cup-winner-595',
    title: '⚽ 2026 世界盃冠軍',
    endDate: '2026-07-20',
    volume24h: '$10.63M',
    category: 'other',
    resolved: false,
    screenshot: 'worldcup.png',
    rec: {
      yes: null,
      reason: '世界盃冠軍極難預測，多個國家有機會。Brazil 市場定價 17.2¢，但實際變數多。觀望。'
    },
    outcomes: [
      { date: 'Brazil', outcome: 'Brazil（巴西）→ YES', yesPrice: 0.172, noPrice: 0.829, prob: '17.2%', yesRec: false, polyUrl: 'https://polymarket.com/event/2026-fifa-world-cup-winner-595' },
      { date: 'France', outcome: 'France（法國）→ YES', yesPrice: 0.164, noPrice: 0.837, prob: '16.4%', yesRec: false, polyUrl: 'https://polymarket.com/event/2026-fifa-world-cup-winner-595' },
      { date: 'Argentina', outcome: 'Argentina（阿根廷）→ YES', yesPrice: 0.111, noPrice: 0.890, prob: '11.1%', yesRec: false, polyUrl: 'https://polymarket.com/event/2026-fifa-world-cup-winner-595' },
      { date: 'Spain', outcome: 'Spain（西班牙）→ YES', yesPrice: 0.089, noPrice: 0.912, prob: '8.9%', yesRec: false, polyUrl: 'https://polymarket.com/event/2026-fifa-world-cup-winner-595' },
      { date: 'England', outcome: 'England（英格蘭）→ YES', yesPrice: 0.050, noPrice: 0.950, prob: '5%', yesRec: false, polyUrl: 'https://polymarket.com/event/2026-fifa-world-cup-winner-595' },
    ]
  },
  {
    slug: 'military-action-against-iran-ends-by-522',
    title: '🇮🇷 美伊軍事行動四月前結束？（已結算）',
    endDate: '2026-04-30',
    volume24h: '$30.74M',
    category: 'geo',
    resolved: true,
    screenshot: 'iran-action.png',
    rec: { yes: null, reason: null },
    outcomes: [
      { date: '結果', outcome: '結算提議：YES（爭議中）', yesPrice: 0.0, noPrice: 0.001, prob: '—', yesRec: false, polyUrl: 'https://polymarket.com/event/military-action-against-iran-ends-by-522' }
    ]
  }
];

let investAmounts = {};

const $ = id => document.getElementById(id);
const fmt = n => isNaN(n) ? '—' : '$' + parseFloat(n).toFixed(2);
const pct = p => p !== undefined && p !== null ? (parseFloat(p) * 100).toFixed(2) + '¢' : '—';
const left = ts => {
  if (!ts) return '—';
  const d = new Date(ts) - Date.now();
  if (d <= 0) return '已結束';
  const D = Math.floor(d / 864e5), h = Math.floor(d % 864e5 / 36e5);
  return D ? `${D}天${h}小時` : `${h}小時`;
};

function render() {
  // Portfolio
  const pos = [{ id: 'hormuz-1', question: 'Strait of Hormuz traffic returns to normal by end of May?', outcome: 'Yes', shares: 115.4, avgPx: 0.345, nowPx: 0.595 }];
  const totalValue = pos.reduce((s, p) => s + p.shares * p.nowPx, 0);
  const totalCost = pos.reduce((s, p) => s + p.shares * p.avgPx, 0);
  const pnl = totalValue - totalCost;
  $('pos-list').innerHTML = pos.map(p => {
    const pnl = p.shares * (p.nowPx - p.avgPx);
    return `<div class="pos-card">
      <div class="pos-chip yes">${p.outcome}</div>
      <div class="pos-q">${p.question}</div>
      <div class="pos-stats">
        <div><div class="pos-s-val">${(p.avgPx*100).toFixed(1)}¢</div><div class="pos-s-lbl">均價</div></div>
        <div><div class="pos-s-val">${(p.nowPx*100).toFixed(1)}¢</div><div class="pos-s-lbl">現價</div></div>
        <div><div class="pos-s-val">${p.shares.toFixed(1)}</div><div class="pos-s-lbl">股數</div></div>
        <div style="color:${pnl>=0?'var(--green)':'#f85149'}"><div class="pos-s-val">${pnl>=0?'+':''}${fmt(pnl)}</div><div class="pos-s-lbl">未實現</div></div>
      </div>
    </div>`;
  }).join('');

  // Markets
  $('markets').innerHTML = MARKETS.map(m => {
    const tag = m.category === 'geo' ? '🌍 地緣' : m.category === 'macro' ? '📊 宏觀' : '⚽ 其他';
    const isPick = m.rec.yes !== null;
    const recBtn = m.outcomes.find(o => o.yesRec) || m.outcomes[0];
    
    return `<div class="market-card ${isPick?'pick':''}">
      <div class="market-title">${m.title}</div>
      <div class="market-meta">
        <span class="tag ${m.category==='geo'?'geo':m.category==='macro'?'macro':''}">${tag}</span>
        <span>💰 ${m.volume24h}</span>
        <span>⏱ ${left(m.endDate)}</span>
        ${m.resolved?'<span class="tag resolved">⚠️ 已結算</span>':''}
      </div>
      
      ${m.resolved ? `<div class="alert-box"><strong>⚠️ 注意：</strong>此市場已結算提議 YES，與你的霍爾木茲海峽倉位是不同市場。</div>` : ''}
      
      ${m.screenshot ? `<img class="market-screenshot" src="${m.screenshot}" alt="${m.title}" onclick="window.open('${recBtn.polyUrl}','_blank')" title="點擊查看 Polymarket">` : ''}
      
      ${isPick && m.rec.reason ? `<div class="rec-box">
        <div class="rec-title">Ada 推薦</div>
        <div class="rec-text">${m.rec.reason}</div>
        <div class="rec-action">
          <div class="rec-action-item">
            <strong>✅ 點這個按鈕：</strong><br>
            ${recBtn.outcome}<br>
            <strong style="color:var(--green);font-size:16px">YES 按鈕：${pct(recBtn.yesPrice)}</strong>
          </div>
        </div>
      </div>` : ''}
      
      ${m.outcomes.map(o => {
        const isYesRec = o.yesRec;
        const btnClass = isYesRec ? 'rec-yes' : '';
        return `<a class="outcome-btn ${btnClass}" href="${o.polyUrl}" target="_blank">
          <div class="outcome-header">
            <span class="outcome-name">${o.outcome}</span>
            <span class="outcome-prob">${o.prob}</span>
          </div>
          <div class="outcome-prices">
            <span class="outcome-price yes">YES ${pct(o.yesPrice)}</span>
            <span style="color:var(--muted);font-size:12px">NO ${pct(o.noPrice)}</span>
            ${isYesRec ? '<span class="rec-arrow yes">🔥 Ada推薦</span>' : ''}
          </div>
        </a>`;
      }).join('')}
      
      ${!m.resolved ? `<div class="invest-row">
        <input class="amt-input" type="number" min="1" max="500" value="${investAmounts[m.slug]||'20'}" placeholder="投入 USDC" onchange="investAmounts['${m.slug}']=this.value">
        <button class="inv-btn" onclick="invest('${m.slug}')">📩 通知 Ada</button>
      </div>` : ''}
    </div>`;
  }).join('');

  // Super alert
  const pickMkt = MARKETS.find(m => m.rec.yes !== null);
  if (pickMkt) {
    const recBtn = pickMkt.outcomes.find(o => o.yesRec) || pickMkt.outcomes[0];
    $('superQ').textContent = pickMkt.title;
    $('superRec').innerHTML = `
      <div class="rec-text" style="margin-bottom:8px">${pickMkt.rec.reason}</div>
      <div style="background:rgba(63,185,80,0.15);border:1px solid rgba(63,185,80,0.3);border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px">
        <strong style="color:var(--green)">✅ Ada 推薦按鈕：</strong><br>
        ${recBtn.outcome}<br>
        <span style="font-size:20px;font-weight:800;color:var(--green)">YES 按鈕：${pct(recBtn.yesPrice)}</span>
      </div>
      <a href="${recBtn.polyUrl}" target="_blank" class="inv-btn" style="display:block;text-align:center;text-decoration:none">🔗 前往 Polymarket 下注</a>`;
    $('superAlert').className = 'super-alert show';
    notif('🔥 ' + pickMkt.title);
  }

  $('lastUpd').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function invest(slug) {
  const m = MARKETS.find(x => x.slug === slug);
  if (!m) return;
  const amount = parseFloat(investAmounts[slug] || '20');
  if (!amount || amount < 1) { toast('請輸入有效金額', 'err'); return; }
  const recBtn = m.outcomes.find(o => o.yesRec) || m.outcomes[0];
  const isRec = m.rec.yes !== null;
  toast(`📩 已通知 Ada：${recBtn.outcome} $${amount} USDC${isRec?'（Ada推薦）':''}`, 'ok');
  console.log('[PolyMonitor INVEST]', { market: m.title, outcome: recBtn.outcome, yesPrice: pct(recBtn.yesPrice), amount, url: recBtn.polyUrl });
  const req = JSON.parse(localStorage.getItem('polyReqs') || '[]');
  req.push({ type: 'invest', market: m.title, outcome: recBtn.outcome, yesPrice: recBtn.yesPrice, amount, url: recBtn.polyUrl, ts: Date.now() });
  localStorage.setItem('polyReqs', JSON.stringify(req));
}

function toast(msg, type = 'ok') { $('toast').className = `toast show ${type}`; $('toast').textContent = msg; setTimeout(() => $('toast').className = 'toast', 4000); }
function notif(msg) { $('notif').textContent = msg; $('notif').className = 'notif show'; setTimeout(() => $('notif').className = 'notif', 6000); }

render();
</script>
</body>
</html>
